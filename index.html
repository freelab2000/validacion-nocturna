<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validación Nocturna PSV</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003366" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192x192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue-dark: #003366;
      --blue-main: #004080;
      --blue-soft: #eaf3fb;
      --card: #ffffff;
      --text: #14213d;
      --muted: #6b7280;
      --line: #d7e3ef;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #e9f1f8 0%, #dce7f2 100%);
      color: var(--text);
      padding: 18px;
      max-width: 860px;
      margin: auto;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: var(--blue-dark);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      margin: 8px 0 18px;
      letter-spacing: -0.8px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 22px;
    }

    .panel {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(180,200,220,0.65);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 30, 60, 0.15);
    }

    .psv-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .psv-box {
      background: linear-gradient(145deg, #ffffff, #f1f5f9);
      border: 1px solid #cfd8e3;
      border-left: 6px solid var(--blue-main);
      border-radius: var(--radius);
      box-shadow: 0 6px 20px rgba(0, 30, 60, 0.08);
      padding: 16px 18px;
    }

    .psv-box h2 {
      font-size: 20px;
      color: var(--blue-dark);
      margin: 0 0 14px;
      font-weight: 800;
      text-align: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 9px;
    }

    .time-row {
      display: grid;
      grid-template-columns: auto auto;
      gap: 52px;
      justify-content: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    label {
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--blue-dark);
      text-align: center;
    }

    .dual-select {
      display: inline-grid;
      grid-template-columns: 82px 82px;
      gap: 8px;
    }

    select {
      width: 82px;
      padding: 10px 8px;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid #b7c4d1;
      border-radius: 12px;
      background: linear-gradient(145deg, #f8fafc, #e6edf5);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
      text-align: center;
    }

    button {
      margin: 18px auto 0;
      display: block;
      width: min(100%, 360px);
      background: linear-gradient(135deg, #315f86, #477ca8);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 16px;
      font-size: 15px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(0, 40, 90, 0.16);
      transition: 0.2s;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .result {
      margin-top: 18px;
    }

    #detalle {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .info-box {
      margin-top: 22px;
      background-color: rgba(234, 243, 251, 0.92);
      border-left: 5px solid #007acc;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 13px;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.82rem;
      color: #6b7280;
      border-top: 1px solid #c9d3df;
      padding-top: 12px;
    }

    @media (max-width: 640px) {
      .time-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .dual-select {
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      select {
        width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <h1>Validación Nocturna PSV</h1>
  <div class="subtitle">Clasificación de PSV en zona roja y validación de noches consecutivas</div>

  <form id="nightForm" class="panel">
    <div class="psv-grid">

      <div class="psv-box">
        <h2>PSV 1</h2>
        <div class="time-row">
          <div class="field">
            <label>Inicio (L.T)</label>
            <div class="dual-select">
              <select id="start1_hh"></select>
              <select id="start1_mm"></select>
            </div>
          </div>
          <div class="field">
            <label>Término (L.T)</label>
            <div class="dual-select">
              <select id="end1_hh"></select>
              <select id="end1_mm"></select>
            </div>
          </div>
        </div>
      </div>

      <div class="psv-box">
        <h2>PSV 2</h2>
        <div class="time-row">
          <div class="field">
            <label>Inicio (L.T)</label>
            <div class="dual-select">
              <select id="start2_hh"></select>
              <select id="start2_mm"></select>
            </div>
          </div>
          <div class="field">
            <label>Término (L.T)</label>
            <div class="dual-select">
              <select id="end2_hh"></select>
              <select id="end2_mm"></select>
            </div>
          </div>
        </div>
      </div>

      <div class="psv-box">
        <h2>PSV 3</h2>
        <div class="time-row">
          <div class="field">
            <label>Inicio (L.T)</label>
            <div class="dual-select">
              <select id="start3_hh"></select>
              <select id="start3_mm"></select>
            </div>
          </div>
          <div class="field">
            <label>Término (L.T)</label>
            <div class="dual-select">
              <select id="end3_hh"></select>
              <select id="end3_mm"></select>
            </div>
          </div>
        </div>
      </div>

    </div>

    <button type="submit">Validar programación</button>
  </form>

  <div id="resultado" class="result"></div>
  <div id="detalle"></div>

  <div class="info-box">
    <strong>ℹ️ Importante:</strong>
    Zona roja entre 00:30 y 05:30 LT.
  </div>

  <footer>
    Versión: <strong>1.3.35.f.w.t</strong>
  </footer>

  <script src="app.js"></script>
</body>
</html>
